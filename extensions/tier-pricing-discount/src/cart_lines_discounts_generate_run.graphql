query CartInput {
  cart {
    lines {
      id
      quantity
      attribute(key: "_bundle_id") {
        value
      }
      isAddon: attribute(key: "_is_addon") {
        value
      }
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        ... on ProductVariant {
          id
          title
          product {
            id
            patchType: metafield(namespace: "custom", key: "patch_type") {
              value
            }
            priceChart: metafield(namespace: "custom", key: "price_chart_tiers") {
              value
            }
          }

        }
      }
    }
  }
}
