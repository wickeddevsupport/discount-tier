<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tier Pricing — Edit Product</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f6f6f7; color: #202223; }
    .topbar { background: #1a1a2e; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .topbar a { color: #aac4ff; text-decoration: none; font-size: 14px; }
    .topbar a:hover { text-decoration: underline; }
    .topbar h1 { font-size: 18px; font-weight: 600; }
    .container { max-width: 900px; margin: 32px auto; padding: 0 16px; }
    .product-header { background: white; border: 1px solid #e1e3e5; border-radius: 10px; padding: 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .product-header img { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; }
    .product-header .no-img { width: 64px; height: 64px; border-radius: 8px; background: #e8e8e8; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .product-header h2 { font-size: 20px; font-weight: 600; }
    .product-header p { font-size: 13px; color: #6d7175; margin-top: 4px; }
    .tables-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 640px) { .tables-grid { grid-template-columns: 1fr; } }
    .tier-card { background: white; border: 1px solid #e1e3e5; border-radius: 10px; padding: 20px; }
    .tier-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .tier-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
    .tier-table th { text-align: left; font-size: 12px; font-weight: 600; color: #6d7175; text-transform: uppercase; padding: 6px 8px; border-bottom: 1px solid #e1e3e5; }
    .tier-table td { padding: 6px 4px; }
    .tier-table input { width: 100%; padding: 7px 10px; border: 1px solid #c9cccf; border-radius: 6px; font-size: 14px; outline: none; }
    .tier-table input:focus { border-color: #458fff; box-shadow: 0 0 0 2px #e0ecff; }
    .tier-table .remove-btn { background: none; border: none; color: #d72c0d; cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 4px; }
    .tier-table .remove-btn:hover { background: #fff4f4; }
    .add-row-btn { background: none; border: 1px dashed #c9cccf; color: #458fff; padding: 7px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; width: 100%; margin-top: 4px; }
    .add-row-btn:hover { background: #f0f6ff; border-color: #458fff; }
    .actions { display: flex; gap: 12px; justify-content: flex-end; }
    .btn-save { padding: 11px 28px; background: #458fff; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-save:hover { background: #2d6fe0; }
    .btn-save:disabled { opacity: 0.6; cursor: default; }
    .btn-cancel { padding: 11px 20px; background: white; color: #202223; border: 1px solid #c9cccf; border-radius: 8px; font-size: 15px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }
    .btn-cancel:hover { background: #f6f6f7; }
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; color: white; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.success { background: #1a6630; }
    .toast.error { background: #d72c0d; }
    .toast.show { opacity: 1; }
    .loading { text-align: center; padding: 48px; color: #6d7175; }
  </style>
</head>
<body>
  <div class="topbar">
    <a id="backLink" href="#">← All Products</a>
    <h1 id="pageTitle">Edit Tier Pricing</h1>
  </div>
  <div class="container" id="app">
    <div class="loading">Loading product...</div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const pathParts = location.pathname.split('/');
    const rawId = pathParts[pathParts.length - 1];
    const shop = new URLSearchParams(location.search).get('shop') || '';
    const productGid = `gid://shopify/Product/${rawId}`;

    document.getElementById('backLink').href = `/admin?shop=${shop}`;

    const PATCH_TYPES = [
      { key: 'embroidery', label: 'Embroidery', icon: '🧵' },
      { key: 'vegan-leather', label: 'Vegan Leather', icon: '🪡' },
    ];

    let productData = null;
    let tiers = { embroidery: [], 'vegan-leather': [] };

    async function init() {
      const res = await fetch(`/api/product/${rawId}/tiers?shop=${shop}`);
      const data = await res.json();
      if (data.error) {
        document.getElementById('app').innerHTML = `<div class="loading">Error: ${data.error}</div>`;
        return;
      }
      productData = data;
      document.getElementById('pageTitle').textContent = data.title;

      // Load existing tiers if present
      if (data.tiers) {
        for (const pt of PATCH_TYPES) {
          if (data.tiers[pt.key]?.length) {
            tiers[pt.key] = data.tiers[pt.key].map(t => ({ qty: t.qty, price: t.price }));
          }
        }
      }

      // Ensure at least one empty row per table
      for (const pt of PATCH_TYPES) {
        if (!tiers[pt.key].length) tiers[pt.key] = [{ qty: '', price: '' }];
      }

      render(data);
    }

    function render(data) {
      document.getElementById('app').innerHTML = `
        <div class="product-header">
          ${data.image ? `<img src="${data.image}" alt="${data.title}">` : '<div class="no-img">🧢</div>'}
          <div>
            <h2>${data.title}</h2>
            <p>${data.variantCount} variant${data.variantCount !== 1 ? 's' : ''}</p>
          </div>
        </div>
        <div class="tables-grid">
          ${PATCH_TYPES.map(pt => renderTierCard(pt)).join('')}
        </div>
        <div class="actions">
          <a class="btn-cancel" href="/admin?shop=${shop}">Cancel</a>
          <button class="btn-save" onclick="saveTiers()">Save Tiers</button>
        </div>
      `;
    }

    function renderTierCard(pt) {
      const rows = tiers[pt.key];
      return `
        <div class="tier-card">
          <h3>${pt.icon} ${pt.label}</h3>
          <table class="tier-table">
            <thead><tr><th>Min Qty</th><th>Price ($)</th><th></th></tr></thead>
            <tbody id="tbody-${pt.key}">
              ${rows.map((r, i) => renderRow(pt.key, i, r)).join('')}
            </tbody>
          </table>
          <button class="add-row-btn" onclick="addRow('${pt.key}')">+ Add tier</button>
        </div>
      `;
    }

    function renderRow(ptKey, index, row) {
      return `
        <tr id="row-${ptKey}-${index}">
          <td><input type="number" min="1" placeholder="e.g. 12" value="${row.qty}" onchange="updateRow('${ptKey}', ${index}, 'qty', this.value)"></td>
          <td><input type="number" min="0" step="0.01" placeholder="e.g. 19.25" value="${row.price}" onchange="updateRow('${ptKey}', ${index}, 'price', this.value)"></td>
          <td><button class="remove-btn" onclick="removeRow('${ptKey}', ${index})" title="Remove">×</button></td>
        </tr>
      `;
    }

    function updateRow(ptKey, index, field, value) {
      tiers[ptKey][index][field] = value;
    }

    function addRow(ptKey) {
      tiers[ptKey].push({ qty: '', price: '' });
      refreshTable(ptKey);
    }

    function removeRow(ptKey, index) {
      if (tiers[ptKey].length === 1) return; // keep at least one row
      tiers[ptKey].splice(index, 1);
      refreshTable(ptKey);
    }

    function refreshTable(ptKey) {
      const pt = PATCH_TYPES.find(p => p.key === ptKey);
      const tbody = document.getElementById(`tbody-${ptKey}`);
      tbody.innerHTML = tiers[ptKey].map((r, i) => renderRow(ptKey, i, r)).join('');
    }

    async function saveTiers() {
      const btn = document.querySelector('.btn-save');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      // Validate & clean
      const payload = {};
      for (const pt of PATCH_TYPES) {
        payload[pt.key] = tiers[pt.key]
          .filter(r => r.qty !== '' && r.price !== '')
          .map(r => ({ qty: parseInt(r.qty), price: parseFloat(r.price) }))
          .filter(r => !isNaN(r.qty) && !isNaN(r.price))
          .sort((a, b) => a.qty - b.qty);
      }

      const res = await fetch(`/api/product/${rawId}/tiers?shop=${shop}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();

      btn.disabled = false;
      btn.textContent = 'Save Tiers';

      if (data.ok) {
        showToast('Tiers saved successfully', 'success');
      } else {
        showToast(data.error || 'Failed to save', 'error');
      }
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.className = `toast ${type}`, 3000);
    }

    init();
  </script>
</body>
</html>
